<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dela | Profil Pribadi</title>
    <meta name="description" content="Website profil pribadi Dela, siswi kelas 12 di SMA N 2 MENGWI.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Latar Belakang Animasi -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Kontainer Utama -->
    <main class="container">
        <div class="glass-card">
            <!-- Bagian Header Profil -->
            <div class="profile-header">
                <div class="profile-img-container">
                    <div class="profile-img">
                        <img src="rabbit.png" alt="Kelinci Lucu" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                    </div>
                </div>
                <h1>Halo, Aku <span class="highlight">Dela</span> 👋</h1>
                <p class="subtitle">Perempuan, 17 Tahun</p>
            </div>
            
            <!-- Bagian Info Detail -->
            <div class="info-section">
                <div class="info-item">
                    <i class="fa-solid fa-school icon"></i>
                    <div>
                        <h3>Pendidikan Saat Ini</h3>
                        <p>SMA N 2 MENGWI, Kelas 12</p>
                    </div>
                </div>
                
                <div class="info-item">
                    <i class="fa-solid fa-heart icon"></i>
                    <div>
                        <h3>Tentang Aku</h3>
                        <p>Aku adalah seorang siswi yang sedang menempuh tahun terakhirku di SMA. Aku menyukai estetika, belajar hal-hal baru, dan sangat menyukai warna ungu!</p>
                    </div>
                </div>
            </div>

            <!-- Bagian Sosial Media -->
            <div class="social-links">
                <a href="https://www.instagram.com/dla.delaa/" target="_blank" class="social-btn" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@hiulodonn_" target="_blank" class="social-btn" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                <a href="mailto:delaernika@gmail.com" class="social-btn" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
            </div>
        </div>
    </main>
</body>
</html>
